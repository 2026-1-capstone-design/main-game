behaviors:
  GladiatorSmooth:
    trainer_type: poca
    hyperparameters:
      batch_size: 4096
      buffer_size: 81920
      learning_rate: 0.0001
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    # behavioral_cloning:
    #   demo_path: Assets/Demos
    #   steps: 8000000
    #   strength: 1.0
    #   batch_size: 4096
    #   num_epoch: 3
    #   samples_per_update: 0
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 512
    summary_freq: 10000
