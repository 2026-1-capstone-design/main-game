behaviors:
  GladiatorSmooth:
    trainer_type: poca
    hyperparameters:
      batch_size: 512
      buffer_size: 40960
      learning_rate: 0.0001
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 512
    summary_freq: 10000
environment_parameters:
  team_size:
    curriculum:
      - name: TeamSize_1v1_PlanOpponent
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.16
          require_reset: true
        value: 1.0
      - name: TeamSize_2v2_PlanOpponent
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.32
          require_reset: true
        value: 2.0
      - name: TeamSize_3v3_PlanOpponent
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.48
          require_reset: true
        value: 3.0
      - name: TeamSize_4v4_PlanOpponent
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.64
          require_reset: true
        value: 4.0
      - name: TeamSize_5v5_PlanOpponent
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.80
          require_reset: true
        value: 5.0
      - name: TeamSize_6v6_PlanOpponent
        value: 6.0
  opponent_mode: 0.0
