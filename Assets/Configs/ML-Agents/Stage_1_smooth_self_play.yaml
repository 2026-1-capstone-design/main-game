behaviors:
  GladiatorSmooth:
    trainer_type: poca
    self_play:
      save_steps: 50000
      team_change: 200000
      swap_steps: 20000
      window: 10
      play_against_latest_model_ratio: 0.7
      initial_elo: 1200.0
    hyperparameters:
      batch_size: 4096
      buffer_size: 81920
      learning_rate: 0.0001
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 40000000
    time_horizon: 512
    summary_freq: 8192
environment_parameters:
  team_size:
    1.0
  opponent_mode: 1.0
  lesson_mode:
    curriculum:
      - name: ChaseTarget
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 2000
          threshold: 0.4
          require_reset: true
        value: 0.0
      - name: FinishLowHp
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 4000
          threshold: 0.7
          require_reset: true
        value: 1.0
      - name: PeelFocusedAlly
        completion_criteria:
          measure: progress
          behavior: GladiatorSmooth
          signal_smoothing: true
          min_lesson_length: 4000
          threshold: 0.8
          require_reset: true
        value: 2.0
      - name: SplitPressure3v3
        value: 3.0
  tactic_mode: 2.0
  team_size: 3.0
