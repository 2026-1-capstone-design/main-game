behaviors:
  Gladiator:
    trainer_type: poca
    self_play:
      save_steps: 50000
      team_change: 200000
      swap_steps: 20000
      window: 10
      play_against_latest_model_ratio: 0.7
      initial_elo: 1200.0
    hyperparameters:
      batch_size: 512
      buffer_size: 40960
      learning_rate: 0.0001
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: True
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5000000
    time_horizon: 512
    summary_freq: 10000
environment_parameters:
  team_size:
    curriculum:
