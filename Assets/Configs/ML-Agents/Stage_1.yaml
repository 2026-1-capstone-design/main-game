behaviors:
  Gladiator:
    trainer_type: poca
    self_play:
      save_steps: 50000
      team_change: 200000
      swap_steps: 20000
      window: 10
      play_against_latest_model_ratio: 0.7
      initial_elo: 1200.0
    hyperparameters:
      batch_size: 512
      buffer_size: 40960
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    # Behavior Cloning: imitation loss is added so policy mimics rule-based demos.
    # demo_path is a directory; trainer loads all .demo files inside it.
    # strength=0.5 balances BC and RL. steps=2M means BC is active for the first
    # 2M trainer steps and then decays. batch_size=64 is the BC mini-batch size.
    behavioral_cloning:
      demo_path: Assets/Demonstrations
      strength: 0.5
      steps: 2000000
      batch_size: 64
      num_epoch: 3
      samples_per_update: 0
    keep_checkpoints: 5
    max_steps: 10000000
    time_horizon: 256
    summary_freq: 10000
environment_parameters:
  team_size:
    curriculum:
      - name: TeamSize_2v2
        completion_criteria:
          measure: progress
          behavior: Gladiator
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.20
          require_reset: true
        value: 2.0
      - name: TeamSize_3v3
        completion_criteria:
          measure: progress
          behavior: Gladiator
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.40
          require_reset: true
        value: 3.0
      - name: TeamSize_4v4
        completion_criteria:
          measure: progress
          behavior: Gladiator
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.60
          require_reset: true
        value: 4.0
      - name: TeamSize_5v5
        completion_criteria:
          measure: progress
          behavior: Gladiator
          signal_smoothing: true
          min_lesson_length: 1000
          threshold: 0.80
          require_reset: true
        value: 5.0
      - name: TeamSize_6v6
        value: 6.0
