name: Auto Approve Inactive PRs

on:
  schedule:
    # 매 시간 0분에 실행
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Auto-approve inactive PRs
        uses: actions/github-script@v7
        with:
          # 조직 레벨 설정이 완료되었으므로 기본 토큰 사용 가능
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const hoursLimit = 48; // 48시간으로 설정
            const now = new Date();
            const threshold = new Date(now.getTime() - (hoursLimit * 60 * 60 * 1000));

            // 모든 오픈된 PR 가져오기
            const { data: pullRequests } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
            });

            console.log(`Checking ${pullRequests.length} open pull requests...`);

            for (const pr of pullRequests) {
              // 1. Draft PR은 제외
              if (pr.draft) {
                console.log(`PR #${pr.number} is a draft. Skipping...`);
                continue;
              }

              const updatedAt = new Date(pr.updated_at);
              
              // 2. 마지막 수정 시각 확인 (48시간 경과 여부)
              if (updatedAt < threshold) {
                console.log(`PR #${pr.number} is inactive since ${pr.updated_at}. Checking for existing approvals...`);

                // 3. 이미 승인했는지 확인 (중복 승인 방지)
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner,
                  repo,
                  pull_number: pr.number,
                });

                const isAlreadyApproved = reviews.some(review =>
                  review.state === 'APPROVED' && review.user.login === 'github-actions[bot]'
                );

                // 4. 각 리뷰어의 마지막 리뷰 상태 확인 — CHANGES_REQUESTED가 남아있으면 건너뜀
                const latestReviewByUser = {};
                for (const review of reviews) {
                  if (review.state === 'COMMENTED') continue; // 코멘트만은 상태에 영향 없음
                  const login = review.user.login;
                  if (!latestReviewByUser[login] || new Date(review.submitted_at) > new Date(latestReviewByUser[login].submitted_at)) {
                    latestReviewByUser[login] = review;
                  }
                }
                const hasUnresolvedChangesRequest = Object.values(latestReviewByUser).some(
                  review => review.state === 'CHANGES_REQUESTED'
                );

                if (hasUnresolvedChangesRequest) {
                  console.log(`PR #${pr.number} has unresolved change requests. Skipping...`);
                } else if (!isAlreadyApproved) {
                  console.log(`Approving PR #${pr.number}...`);
                  await github.rest.pulls.createReview({
                    owner,
                    repo,
                    pull_number: pr.number,
                    event: 'APPROVE',
                    body: `Automatically approved after ${hoursLimit} hours of inactivity since the last update.`
                  });
                } else {
                  console.log(`PR #${pr.number} was already approved by this bot.`);
                }
              } else {
                console.log(`PR #${pr.number} is still active. Skipping...`);
              }
            }
